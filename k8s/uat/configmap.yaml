# ============================================================
# k8s/uat/configmap.yaml
# Non-sensitive configuration for UAT environment
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-cur-scheduler-config
  namespace: cost-reporter-uat
  labels:
    app: aws-cur-scheduler
    env: uat
data:
  APP_ENV: "uat"
  APP_AWS_REGION: "ap-southeast-1"
  APP_CUR_S3_BUCKET: "YOUR_S3_BUCKET_NAME"
  APP_CUR_S3_PREFIX: "YOUR_S3_PREFIX"
  APP_BUDGET_LIMIT_USD: "1000"
  APP_BUDGET_ALERT_THRESHOLD_PCT: "70"
  APP_REPORT_TOP_N_RESOURCES: "15"
  APP_LOG_LEVEL: "info"
  APP_LOG_FORMAT: "json"
