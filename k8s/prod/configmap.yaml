# ============================================================
# k8s/prod/configmap.yaml
# Non-sensitive configuration for PROD environment
# Credentials come from IRSA — no keys needed
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-cur-scheduler-config
  namespace: cost-reporter-prod
  labels:
    app: aws-cur-scheduler
    env: prod
data:
  APP_ENV: "prod"
  APP_AWS_REGION: "ap-southeast-1"
  APP_CUR_S3_BUCKET: "YOUR_S3_BUCKET_NAME"
  APP_CUR_S3_PREFIX: "YOUR_S3_PREFIX"
  APP_BUDGET_LIMIT_USD: "5000"
  APP_BUDGET_ALERT_THRESHOLD_PCT: "70"
  APP_REPORT_TOP_N_RESOURCES: "20"
  APP_LOG_LEVEL: "info"
  APP_LOG_FORMAT: "json"
