# ============================================================
# k8s/dev/configmap.yaml
# Non-sensitive configuration for DEV environment
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-cur-scheduler-config
  namespace: cost-reporter-dev
  labels:
    app: aws-cur-scheduler
    env: dev
data:
  APP_ENV: "dev"
  APP_AWS_REGION: "ap-southeast-1"
  APP_CUR_S3_BUCKET: "YOUR_S3_BUCKET_NAME"
  APP_CUR_S3_PREFIX: "YOUR_S3_PREFIX"
  APP_BUDGET_LIMIT_USD: "500"
  APP_BUDGET_ALERT_THRESHOLD_PCT: "70"
  APP_REPORT_TOP_N_RESOURCES: "15"
  APP_LOG_LEVEL: "debug"
  APP_LOG_FORMAT: "json"
